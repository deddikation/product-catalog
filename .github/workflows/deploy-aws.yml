# =============================================================================
# Workflow: deploy-aws.yml
# Purpose:  Deploy to AWS on every push to main (after CI passes).
#           - Backend  → AWS Elastic Beanstalk (.NET 9 on Amazon Linux 2023)
#           - Frontend → AWS S3 + CloudFront invalidation
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID       — IAM user key (needs EB + S3 + CloudFront permissions)
#   AWS_SECRET_ACCESS_KEY   — IAM user secret
#
# Required GitHub Variables (Settings → Variables → Actions):
#   AWS_REGION              — e.g. us-east-1
#   EB_APP_NAME             — Elastic Beanstalk application name
#   EB_ENV_NAME             — Elastic Beanstalk environment name
#   S3_BUCKET               — S3 bucket name for frontend (e.g. product-catalog-ui)
#   CLOUDFRONT_DIST_ID      — CloudFront distribution ID (e.g. E1ABCDEF123456)
# =============================================================================

name: Deploy to AWS

on:
  push:
    branches: ["main"]

  workflow_dispatch:

concurrency:
  group: aws-production
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Gate: CI must pass first
  # ---------------------------------------------------------------------------
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # Deploy Backend → AWS Elastic Beanstalk
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy API to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: aws-production

    steps:
      - name: Download API artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish

      - name: Zip deployment package
        run: |
          cd publish
          zip -r ../deploy.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload package to S3 (EB staging bucket)
        run: |
          VERSION_LABEL="build-${{ github.sha }}"
          aws s3 cp deploy.zip \
            s3://${{ vars.S3_BUCKET }}/eb-deployments/${VERSION_LABEL}.zip

          # Create new EB application version
          aws elasticbeanstalk create-application-version \
            --application-name "${{ vars.EB_APP_NAME }}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle S3Bucket="${{ vars.S3_BUCKET }}",S3Key="eb-deployments/${VERSION_LABEL}.zip" \
            --auto-create-application

          # Deploy to environment
          aws elasticbeanstalk update-environment \
            --environment-name "${{ vars.EB_ENV_NAME }}" \
            --version-label "${VERSION_LABEL}"

      - name: Wait for environment to be ready
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ vars.EB_APP_NAME }}" \
            --environment-names "${{ vars.EB_ENV_NAME }}"

  # ---------------------------------------------------------------------------
  # Deploy Frontend → AWS S3 + CloudFront
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: aws-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build with production API URL
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/frontend/browser/ \
            s3://${{ vars.S3_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html must not be cached (so new deployments take effect immediately)
          aws s3 cp frontend/dist/frontend/browser/index.html \
            s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
