# =============================================================================
# Workflow: ci.yml
# Purpose:  Continuous Integration — runs on pull requests to main.
#           On direct pushes to main, the deploy workflow runs instead
#           (it includes its own build and test steps).
# =============================================================================

name: CI

on:
  pull_request:
    branches: ["main"]

jobs:

  backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        working-directory: backend
        run: dotnet test tests/ProductCatalog.UnitTests/ --no-build --configuration Release

      - name: Run integration tests
        working-directory: backend
        run: dotnet test tests/ProductCatalog.IntegrationTests/ --no-build --configuration Release

  frontend:
    name: Frontend (Angular 19)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npx ng test --watch=false --browsers=ChromeHeadless

      - name: Build production bundle
        working-directory: frontend
        run: npx ng build --configuration production
