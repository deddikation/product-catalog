# =============================================================================
# Workflow: deploy-azure.yml
# Purpose:  Deploy to Azure on every push to main (after CI passes).
#           - Backend  → Azure App Service (Linux, .NET 9, West Europe)
#           - Frontend → Azure Static Web Apps
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AZURE_WEBAPP_PUBLISH_PROFILE    — XML from: az webapp deployment list-publishing-profiles
#                                     --name product-catalog-api --resource-group product-catalog-rg --xml
#   AZURE_STATIC_WEB_APPS_API_TOKEN — Azure Portal → Static Web Apps → Manage deployment token
#
# Required GitHub Variables (Settings → Variables → Actions):
#   AZURE_WEBAPP_NAME  — product-catalog-api
# =============================================================================

name: Deploy to Azure

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: azure-production
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Gate: CI must pass first (build + all 164 tests)
  # ---------------------------------------------------------------------------
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # Deploy Backend → Azure App Service
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: azure-production
      url: https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download API artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

  # ---------------------------------------------------------------------------
  # Deploy Frontend → Azure Static Web Apps
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: azure-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist/frontend/browser
