# =============================================================================
# Workflow: deploy-azure.yml
# Purpose:  Build, test, and deploy to Azure on every push to main.
#           - Backend  → Azure App Service (Linux, .NET 9, West Europe)
#           - Frontend → Azure Static Web Apps
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS               — JSON from: az ad sp create-for-rbac --name "github-product-catalog"
#                                     --role contributor --scopes /subscriptions/<SUB_ID>/resourceGroups/product-catalog-rg --sdk-auth
#   AZURE_STATIC_WEB_APPS_API_TOKEN — az staticwebapp secrets list --name product-catalog-ui
#                                     --resource-group product-catalog-rg --query "properties.apiKey" --output tsv
#
# Required GitHub Variables:
#   AZURE_WEBAPP_NAME  — product-catalog-api-lx
# =============================================================================

name: Deploy to Azure

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: azure-production
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Build & Test Backend
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        working-directory: backend
        run: dotnet test tests/ProductCatalog.UnitTests/ --no-build --configuration Release

      - name: Run integration tests
        working-directory: backend
        run: dotnet test tests/ProductCatalog.IntegrationTests/ --no-build --configuration Release

      - name: Publish API
        working-directory: backend/src/ProductCatalog.Api
        run: dotnet publish --configuration Release --output ./publish

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: backend/src/ProductCatalog.Api/publish/

  # ---------------------------------------------------------------------------
  # Build & Test Frontend
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npx ng test --watch=false --browsers=ChromeHeadless

      - name: Build production bundle
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser/

  # ---------------------------------------------------------------------------
  # Deploy Backend → Azure App Service (via Azure CLI zip deploy)
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    needs: build-backend
    environment:
      name: production
      url: https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish

      - name: Zip publish output
        run: cd publish && zip -r ../app.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy zip to Azure App Service
        run: |
          az webapp deploy \
            --name ${{ vars.AZURE_WEBAPP_NAME }} \
            --resource-group product-catalog-rg \
            --src-path app.zip \
            --type zip

  # ---------------------------------------------------------------------------
  # Deploy Frontend → Azure Static Web Apps
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist/frontend/browser
